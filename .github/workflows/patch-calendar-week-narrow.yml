name: Patch calendar week narrow columns

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-calendar-week-narrow.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Narrow columns
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('calendar_week.php')
          s = p.read_text()
          replacements = {
              'grid-template-columns:60px repeat(var(--cw-cols),minmax(42px,1fr))': 'grid-template-columns:54px repeat(var(--cw-cols),minmax(34px,1fr))',
              'grid-template-rows:34px 38px repeat(36,26px)': 'grid-template-rows:32px 34px repeat(36,25px)',
              'calc(60px + var(--cw-cols) * 42px)': 'calc(54px + var(--cw-cols) * 34px)',
              'top:34px': 'top:32px',
              'width:24px;height:24px': 'width:21px;height:21px',
              'font-size:10px}.cw-time': 'font-size:9px}.cw-time',
              'padding-right:8px': 'padding-right:6px',
              'font-size:10px;font-weight:700;color:#002050}.cw-slot': 'font-size:9px;font-weight:700;color:#002050}.cw-slot',
              'margin:3px;border-radius:8px': 'margin:2px;border-radius:7px',
              'grid-template-columns:46px repeat(var(--cw-cols),minmax(36px,1fr))': 'grid-template-columns:42px repeat(var(--cw-cols),minmax(30px,1fr))',
              'grid-template-rows:32px 36px repeat(36,24px)': 'grid-template-rows:30px 32px repeat(36,23px)',
              'calc(46px + var(--cw-cols) * 36px)': 'calc(42px + var(--cw-cols) * 30px)',
          }
          changed = False
          for old, new in replacements.items():
              if old in s:
                  s = s.replace(old, new)
                  changed = True
          if not changed:
              raise SystemExit('No replacements applied')
          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar_week.php
          git commit -m "Narrow weekly team calendar columns"
          git push
