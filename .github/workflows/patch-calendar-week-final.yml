name: Final calendar week patch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-calendar-week-final.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply final calendar week changes
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('calendar_week.php')
          s = p.read_text()

          s = s.replace("$pz_page_breadcrumbs = ['Saptamana pe tehnicieni'];", "$pz_page_breadcrumbs = ['Tehnicieni'];")
          s = s.replace('<title>Calendar saptamanal - CRM</title>', '<title>Calendar tehnicieni - CRM</title>')

          old = "$selectedTeam = $_GET['team'] ?? 'all';\n$selectedTeam = ($selectedTeam === 'all' || ctype_digit((string)$selectedTeam)) ? (string)$selectedTeam : 'all';"
          new = r"""$selectedTeamIds = [];
$rawTeamIds = $_GET['team_ids'] ?? null;
$rawTeamsParam = $_GET['teams'] ?? ($_GET['team'] ?? 'all');

if (is_array($rawTeamIds)) {
    foreach ($rawTeamIds as $rawId) {
        $id = (int)$rawId;
        if ($id > 0) { $selectedTeamIds[$id] = $id; }
    }
} elseif ($rawTeamsParam !== 'all') {
    foreach (explode(',', (string)$rawTeamsParam) as $rawId) {
        $id = (int)trim($rawId);
        if ($id > 0) { $selectedTeamIds[$id] = $id; }
    }
}

$selectedTeamIds = array_values($selectedTeamIds);
$selectedTeam = $selectedTeamIds ? implode(',', $selectedTeamIds) : 'all';
$teamQueryValue = $selectedTeam;"""
          if old in s:
              s = s.replace(old, new, 1)

          old = "$teamSql = \"SELECT id, name, color FROM team_members WHERE active = 1\";\n$teamParams = [];\nif ($selectedTeam !== 'all') { $teamSql .= \" AND id = ?\"; $teamParams[] = (int)$selectedTeam; }\n$teamSql .= \" ORDER BY name ASC\";\n$stmt = $pdo->prepare($teamSql);\n$stmt->execute($teamParams);\n$teams = $stmt->fetchAll(PDO::FETCH_ASSOC);"
          new = r"""$allTeams = [];
try {
    $allTeams = $pdo->query("SELECT id, name, color FROM team_members WHERE active = 1 ORDER BY name ASC")->fetchAll(PDO::FETCH_ASSOC);
} catch (Throwable $e) {
    $allTeams = [];
}

$validTeamIds = array_map('intval', array_column($allTeams, 'id'));
$selectedTeamIds = $selectedTeamIds ? array_values(array_intersect($selectedTeamIds, $validTeamIds)) : [];
$selectedTeam = $selectedTeamIds ? implode(',', $selectedTeamIds) : 'all';
$teamQueryValue = $selectedTeam;

$teamSql = "SELECT id, name, color FROM team_members WHERE active = 1";
$teamParams = [];
if ($selectedTeamIds) {
    $teamSql .= " AND id IN (" . implode(',', array_fill(0, count($selectedTeamIds), '?')) . ")";
    $teamParams = $selectedTeamIds;
}
$teamSql .= " ORDER BY name ASC";
$stmt = $pdo->prepare($teamSql);
$stmt->execute($teamParams);
$teams = $stmt->fetchAll(PDO::FETCH_ASSOC);"""
          if old in s:
              s = s.replace(old, new, 1)

          old = "$teamFilterMain = '';\nif ($selectedTeam !== 'all') { $teamFilterMain = ' AND a.team_member_id = ?'; $params[] = (int)$selectedTeam; }"
          new = r"""$teamFilterMain = '';
if ($selectedTeamIds) {
    $teamFilterMain = ' AND a.team_member_id IN (' . implode(',', array_fill(0, count($selectedTeamIds), '?')) . ')';
    $params = array_merge($params, $selectedTeamIds);
}"""
          if old in s:
              s = s.replace(old, new, 1)

          old = "$teamFilterSupport = '';\n        if ($selectedTeam !== 'all') { $teamFilterSupport = ' AND at.team_id = ?'; $params2[] = (int)$selectedTeam; }"
          new = r"""$teamFilterSupport = '';
        if ($selectedTeamIds) {
            $teamFilterSupport = ' AND at.team_id IN (' . implode(',', array_fill(0, count($selectedTeamIds), '?')) . ')';
            $params2 = array_merge($params2, $selectedTeamIds);
        }"""
          if old in s:
              s = s.replace(old, new, 1)

          # URL param names: keep legacy team only where the old calendar needs one team; week uses teams=1,2,3
          s = s.replace('&team=<?= cw_h($selectedTeam) ?>', '&teams=<?= cw_h($teamQueryValue) ?>')
          s = s.replace('value="<?= cw_h($selectedTeam) ?>"', 'value="<?= cw_h($teamQueryValue) ?>"')

          old = r'''                    <form method="get" action="calendar.php" style="display:flex;gap:8px;align-items:center;">
                        <input type="hidden" name="date" value="<?= cw_h($date) ?>"><input type="hidden" name="view" value="week">
                        <select name="team" class="cw-select" onchange="this.form.submit()">
                            <option value="all" <?= $selectedTeam === 'all' ? 'selected' : '' ?>>Toate echipele</option>
                            <?php foreach ($pdo->query("SELECT id, name FROM team_members WHERE active=1 ORDER BY name ASC")->fetchAll(PDO::FETCH_ASSOC) as $t): ?>
                                <option value="<?= (int)$t['id'] ?>" <?= $selectedTeam === (string)$t['id'] ? 'selected' : '' ?>><?= cw_h($t['name']) ?></option>
                            <?php endforeach; ?>
                        </select>
                    </form>'''
          new = r'''                    <form method="get" action="calendar_week.php" class="cw-team-filter">
                        <input type="hidden" name="date" value="<?= cw_h($date) ?>">
                        <details class="cw-team-picker">
                            <summary><?= $selectedTeamIds ? (count($selectedTeamIds) . ' tehnicieni') : 'Toate echipele' ?></summary>
                            <div class="cw-team-menu">
                                <a class="cw-team-all" href="calendar_week.php?date=<?= cw_h($date) ?>&teams=all">Toate echipele</a>
                                <?php foreach ($allTeams as $t): ?>
                                    <label class="cw-team-option">
                                        <input type="checkbox" name="team_ids[]" value="<?= (int)$t['id'] ?>" <?= in_array((int)$t['id'], $selectedTeamIds, true) ? 'checked' : '' ?>>
                                        <span><?= cw_h($t['name']) ?></span>
                                    </label>
                                <?php endforeach; ?>
                                <button class="btn accent cw-team-apply" type="submit">Aplica</button>
                            </div>
                        </details>
                    </form>'''
          if old in s:
              s = s.replace(old, new, 1)

          css_insert = ".cw-team-filter{position:relative}.cw-team-picker{position:relative}.cw-team-picker summary{min-width:190px;min-height:40px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:#fff;font-weight:800;cursor:pointer;list-style:none}.cw-team-picker summary::-webkit-details-marker{display:none}.cw-team-menu{position:absolute;right:0;top:calc(100% + 8px);z-index:90;width:250px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);padding:10px}.cw-team-all{display:block;padding:8px 10px;border-radius:10px;text-decoration:none;color:#002050;font-weight:850;background:#F8FAFC;margin-bottom:6px}.cw-team-option{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:9px;font-size:12px;font-weight:750;color:#002050;cursor:pointer}.cw-team-option:hover{background:#F8FAFC}.cw-team-option input{width:15px;height:15px}.cw-team-apply{width:100%;justify-content:center;margin-top:8px}.cw-day-start{border-left:3px solid rgba(15,23,42,.72)!important}.cw-day-divider{border-left:3px solid rgba(15,23,42,.72)!important}"
          if '.cw-team-picker summary' not in s:
              s = s.replace('</style>', css_insert + '\n    </style>', 1)

          s = s.replace('<div class="cw-day" style=', '<div class="cw-day cw-day-divider" style=')
          s = s.replace('<div class="cw-team" style="grid-column:<?= $col ?>;', '<div class="cw-team<?= $tIndex === 0 ? \' cw-day-start\' : \'\' ?>" style="grid-column:<?= $col ?>;')
          s = s.replace('<div class="cw-slot <?= $isHour ? \'cw-hour\' : \'\' ?>" style=', '<div class="cw-slot<?= $tIndex === 0 ? \' cw-day-start\' : \'\' ?> <?= $isHour ? \'cw-hour\' : \'\' ?>" style=')

          p.write_text(s)

          p2 = Path('calendar.php')
          if p2.exists():
              c = p2.read_text()
              old_select = '<select class="select view-select" name="view" onchange="this.form.submit()">'
              new_select = '<select class="select view-select" name="view" onchange="if (this.value === \'week\') { window.location.href = \'calendar_week.php?date=<?= urlencode($currentDate) ?>&teams=<?= urlencode($selectedTeam) ?>\'; } else { this.form.submit(); }">'
              if old_select in c and new_select not in c:
                  c = c.replace(old_select, new_select, 1)
                  p2.write_text(c)
          PY
      - name: Commit changes and cleanup workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar_week.php calendar.php || true
          git rm -f .github/workflows/patch-calendar-week-final.yml .github/workflows/patch-calendar-week-narrow.yml .github/workflows/patch-calendar-day-week-link.yml || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Polish weekly technician calendar"
          git push
