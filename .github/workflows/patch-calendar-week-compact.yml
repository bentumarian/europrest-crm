name: Patch weekly calendar team columns

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-calendar-week-compact.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply weekly calendar team columns patch
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('calendar.php')
          s = p.read_text()

          # 1) PHP data pentru zilele saptamanii
          week_php_marker = "$rangeEnd = $rangeEndObj->format('Y-m-d');"
          week_php_insert = r'''

$weekDates = [];
if ($view === 'week') {
    $shortWeekDays = [
        1 => 'LUN',
        2 => 'MAR',
        3 => 'MIE',
        4 => 'JOI',
        5 => 'VIN',
        6 => 'SAM',
        7 => 'DUM',
    ];

    for ($i = 0; $i < 7; $i++) {
        $dayObj = (clone $rangeStartObj)->modify('+' . $i . ' days');
        $weekDates[] = [
            'date' => $dayObj->format('Y-m-d'),
            'label' => ($shortWeekDays[(int)$dayObj->format('N')] ?? $dayObj->format('D')) . '. ' . $dayObj->format('d.m'),
        ];
    }
}
'''
          if "$weekDates = [];" not in s:
              s = s.replace(week_php_marker, week_php_marker + week_php_insert, 1)

          # 2) CSS pentru calendarul saptamanal custom
          css_marker = "</style>"
          week_css = r'''

/* Calendar saptamanal custom: fiecare zi are coloane separate pe tehnicieni */
.week-schedule-scroll {
    width: 100%;
    max-width: 100%;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    max-height: calc(100vh - 155px);
    border: 1px solid rgba(0,32,80,.24);
    border-radius: var(--radius-lg);
    background: var(--surface);
    box-shadow: 0 16px 34px rgba(0,32,80,.06);
}
.week-schedule-grid {
    width: max(100%, calc(62px + (var(--week-columns) * 48px)));
    min-width: max(100%, calc(62px + (var(--week-columns) * 48px)));
    display: grid;
    grid-template-columns: 62px repeat(var(--week-columns), minmax(48px, 1fr));
    grid-template-rows: 34px 42px repeat(36, 28px);
    position: relative;
}
.week-corner {
    position: sticky;
    top: 0;
    left: 0;
    z-index: 42;
    background: rgba(255,255,255,.94);
    border-right: 1px solid rgba(0,32,80,.26);
    border-bottom: 1px solid rgba(0,32,80,.24);
    backdrop-filter: blur(14px);
}
.week-day-head {
    position: sticky;
    top: 0;
    z-index: 35;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #ffffff 0%, #F5F7FB 100%);
    border-left: 1px solid rgba(0,32,80,.20);
    border-bottom: 1px solid rgba(0,32,80,.24);
    color: #002050;
    font-size: 11px;
    font-weight: 850;
    letter-spacing: .045em;
}
.week-team-head {
    position: sticky;
    top: 34px;
    z-index: 32;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in srgb, var(--team-color) 18%, #ffffff);
    border-left: 1px solid rgba(0,32,80,.20);
    border-bottom: 1px solid rgba(0,32,80,.24);
    box-shadow: inset 0 3px 0 var(--team-color);
}
.week-team-dot {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--team-color);
    color: #fff;
    font-size: 10px;
    font-weight: 900;
    box-shadow: 0 8px 18px color-mix(in srgb, var(--team-color) 30%, transparent), inset 0 1px 0 rgba(255,255,255,.32);
}
.week-time-cell {
    position: sticky;
    left: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 8px;
    background: #fff;
    border-right: 1px solid rgba(0,32,80,.26);
    border-bottom: 1px solid rgba(0,32,80,.18);
    color: #002050;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 650;
}
.week-slot-cell {
    min-width: 0;
    background: color-mix(in srgb, var(--team-color) 5%, #ffffff);
    border-left: 1px solid rgba(0,32,80,.13);
    border-bottom: 1px solid rgba(0,32,80,.13);
    cursor: pointer;
    transition: background .1s ease, outline .1s ease;
}
.week-slot-cell.hour-line,
.week-time-cell.hour-line {
    border-top: 1px solid rgba(0,32,80,.28);
}
.week-slot-cell:hover {
    background: color-mix(in srgb, var(--team-color) 15%, #ffffff);
    outline: 2px solid color-mix(in srgb, var(--team-color) 55%, transparent);
    outline-offset: -2px;
}
.week-slot-cell.drag-over {
    background: rgba(14, 116, 144, .16);
    outline: 2px dashed var(--accent);
    outline-offset: -3px;
}
.week-event {
    position: relative;
    z-index: 25;
    margin: 3px 4px;
    border-radius: 9px;
    cursor: pointer;
    border: 1px solid rgba(0,32,80,.16);
    box-shadow: 0 8px 18px rgba(0,32,80,.14), inset 0 1px 0 rgba(255,255,255,.28);
    overflow: hidden;
    min-height: 18px;
}
.week-event::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.25), transparent 55%);
    pointer-events: none;
}
.week-event:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(0,32,80,.18), inset 0 1px 0 rgba(255,255,255,.32);
}
.week-event.done {
    box-shadow: inset 0 1px 0 rgba(255,255,255,.70), 0 6px 14px rgba(0,32,80,.08);
}
.week-event.done::before {
    content: '✓';
    position: absolute;
    top: 3px;
    right: 4px;
    z-index: 2;
    width: 14px;
    height: 14px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.85);
    color: #002050;
    font-size: 9px;
    font-weight: 900;
}
@media(max-width: 860px) {
    .week-schedule-grid {
        width: max(100%, calc(46px + (var(--week-columns) * 38px)));
        min-width: max(100%, calc(46px + (var(--week-columns) * 38px)));
        grid-template-columns: 46px repeat(var(--week-columns), minmax(38px, 1fr));
        grid-template-rows: 32px 38px repeat(36, 24px);
    }
    .week-time-cell { padding: 0 4px; font-size: 8px; justify-content: center; }
    .week-day-head { font-size: 9px; }
    .week-team-dot { width: 22px; height: 22px; font-size: 9px; }
    .week-event { margin: 2px; border-radius: 7px; }
}
'''
          if '.week-schedule-grid' not in s:
              s = s.replace(css_marker, week_css + '\n' + css_marker, 1)

          # 3) HTML custom pentru saptamana, intre view=day si month FullCalendar
          old_tail = """            <?php else: ?>
                <div class=\"fc-card\"><div id=\"visualCalendar\"></div></div>
            <?php endif; ?>"""
          new_tail = r'''            <?php elseif ($view === 'week'): ?>
                <?php $weekTeamCount = max(1, count($teams)); ?>
                <div class="week-schedule-scroll">
                    <div class="week-schedule-grid" style="--week-columns: <?= (int)(count($weekDates) * $weekTeamCount) ?>;">
                        <div class="week-corner" style="grid-column:1;grid-row:1 / span 2;"></div>

                        <?php foreach ($weekDates as $dayIndex => $day): ?>
                            <?php $dayStartColumn = 2 + ($dayIndex * $weekTeamCount); ?>
                            <div class="week-day-head" style="grid-column:<?= $dayStartColumn ?> / span <?= $weekTeamCount ?>;grid-row:1;">
                                <?= hcal($day['label']) ?>
                            </div>
                            <?php foreach ($teams as $teamIndex => $team): ?>
                                <?php $teamColor = calendar_clean_hex_color($team['color'] ?? null); $teamColumnWeek = $dayStartColumn + $teamIndex; ?>
                                <div class="week-team-head" style="grid-column:<?= $teamColumnWeek ?>;grid-row:2;--team-color:<?= hcal($teamColor) ?>;" title="<?= hcal($team['name']) ?>">
                                    <span class="week-team-dot"><?= hcal(calendar_initials($team['name'])) ?></span>
                                </div>
                            <?php endforeach; ?>
                        <?php endforeach; ?>

                        <?php foreach ($slots as $slotIndex => $slot): ?>
                            <?php $row = $slotIndex + 3; $isHour = substr($slot, -3) === ':00'; ?>
                            <div class="week-time-cell<?= $isHour ? ' hour-line' : '' ?>" style="grid-column:1;grid-row:<?= $row ?>;"><?= $isHour ? hcal($slot) : '' ?></div>
                            <?php foreach ($weekDates as $dayIndex => $day): ?>
                                <?php $dayStartColumn = 2 + ($dayIndex * $weekTeamCount); ?>
                                <?php foreach ($teams as $teamIndex => $team): ?>
                                    <?php $teamColor = calendar_clean_hex_color($team['color'] ?? null); $teamColumnWeek = $dayStartColumn + $teamIndex; ?>
                                    <div class="week-slot-cell<?= $isHour ? ' hour-line' : '' ?>" style="grid-column:<?= $teamColumnWeek ?>;grid-row:<?= $row ?>;--team-color:<?= hcal($teamColor) ?>;" data-drop-date="<?= hcal($day['date']) ?>" data-drop-time="<?= hcal($slot) ?>" data-drop-team="<?= (int)$team['id'] ?>" <?php if ($isAdmin): ?>onclick="openCreateModal('<?= hcal($day['date']) ?>', '<?= hcal($slot) ?>', '<?= (int)$team['id'] ?>')" ondragover="handleSlotDragOver(event)" ondragleave="handleSlotDragLeave(event)" ondrop="handleSlotDrop(event)"<?php endif; ?>></div>
                                <?php endforeach; ?>
                            <?php endforeach; ?>
                        <?php endforeach; ?>

                        <?php foreach ($appointments as $appt): ?>
                            <?php
                                $teamId = (int)($appt['display_team_member_id'] ?? $appt['team_member_id'] ?? 0);
                                $teamIndex = null;
                                foreach ($teams as $idx => $team) {
                                    if ((int)$team['id'] === $teamId) { $teamIndex = $idx; break; }
                                }
                                if ($teamIndex === null) { continue; }
                                $dayIndex = null;
                                foreach ($weekDates as $idx => $day) {
                                    if ($day['date'] === ($appt['appointment_date'] ?? '')) { $dayIndex = $idx; break; }
                                }
                                if ($dayIndex === null) { continue; }
                                $apptStartTime = $appt['start_time'] ?: '09:00:00';
                                $apptEndTime = $appt['end_time'] ?: null;
                                $gridColumn = 2 + ($dayIndex * $weekTeamCount) + $teamIndex;
                                $gridRow = slot_index($apptStartTime, $startHour) + 2;
                                $span = duration_span($apptStartTime, $apptEndTime);
                                $teamColor = calendar_clean_hex_color($appt['display_team_color'] ?? $appt['team_color'] ?? null);
                                $color = $teamColor;
                                $borderColor = $teamColor;
                                $isFinalizedEvent = (($appt['status'] ?? '') === 'finalizata');
                                if ($isFinalizedEvent) {
                                    $color = calendar_lighten_hex($teamColor, 0.84);
                                    $borderColor = calendar_lighten_hex($teamColor, 0.45);
                                } elseif (($appt['status'] ?? '') === 'in_lucru') {
                                    $color = '#64748B';
                                    $borderColor = '#64748B';
                                }
                                $isPrimaryAssignment = ((int)($appt['appointment_team_is_primary'] ?? 1) === 1);
                                $eventTitle = ($appt['client_name'] ?: 'Client') . ' - ' . substr($apptStartTime, 0, 5) . ' - ' . ($appt['service_type'] ?: 'Lucrare') . ' - ' . ($appt['display_team_name'] ?? $appt['team_name'] ?? 'Tehnician');
                            ?>
                            <div class="week-event<?= $isFinalizedEvent ? ' done' : '' ?>" style="grid-column:<?= $gridColumn ?>;grid-row:<?= $gridRow ?>/span <?= $span ?>;background:<?= hcal($color) ?>;border-color:<?= hcal($borderColor) ?>;" <?php if ($isAdmin && !$isFinalizedEvent && $isPrimaryAssignment): ?>draggable="true" data-appointment-id="<?= (int)$appt['id'] ?>" ondragstart="handleAppointmentDragStart(event)" ondragend="handleAppointmentDragEnd(event)"<?php endif; ?> onclick="event.stopPropagation(); if (!window.pzAppointmentWasDragged) loadAppointment(<?= (int)$appt['id'] ?>)" title="<?= hcal($eventTitle) ?>" aria-label="<?= hcal($eventTitle) ?>"></div>
                        <?php endforeach; ?>
                    </div>
                </div>
            <?php else: ?>
                <div class="fc-card"><div id="visualCalendar"></div></div>
            <?php endif; ?>'''
          if 'week-schedule-scroll' not in s:
              if old_tail not in s:
                  raise SystemExit('Target render block not found')
              s = s.replace(old_tail, new_tail, 1)

          # 4) Daca exista patch-ul vechi pentru FullCalendar week, il lasam doar ca fallback.
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.php
          git commit -m "Add weekly calendar team columns"
          git push
